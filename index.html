<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Quick Clip (Rescue Mode)</title>
    
    <link rel="icon" href="image_33.png">
    <link rel="apple-touch-icon" href="image_33.png">

    <style>
        :root {
            --main: #333;
            --bg: #fff;
            --accent: #eee;
            --input-bg: #fafafa;
            --radius: 15px;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; }
        textarea { -webkit-user-select: text; user-select: text; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            padding: env(safe-area-inset-top, 20px) 20px env(safe-area-inset-bottom, 20px) 20px;
        }

        .container { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 15px; }
        header { display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 1.8rem; font-weight: 800; letter-spacing: -1.5px; }

        .hub-link {
            text-decoration: none; font-size: 0.8rem; font-weight: 800; color: var(--main);
            background: var(--accent); padding: 8px 14px; border-radius: var(--radius);
        }

        .input-card { background: var(--input-bg); padding: 18px; border-radius: var(--radius); border: 2px solid var(--accent); }
        .label { font-size: 0.75rem; font-weight: 900; color: #666; margin-bottom: 10px; display: block; text-transform: uppercase; }
        .input-wrapper { position: relative; }

        textarea {
            width: 100%; height: 80px; padding: 15px; border: 2px solid var(--accent); border-radius: var(--radius);
            background: #fff; font-size: 1rem; font-weight: 600; color: var(--main) !important;
            outline: none; resize: none; -webkit-appearance: none; -webkit-text-fill-color: var(--main) !important; opacity: 1 !important;
        }

        .action-btn { width: 100%; padding: 18px; background: var(--main); color: #fff; border: none; border-radius: var(--radius); font-size: 1rem; font-weight: 800; cursor: pointer; }

        #clip-list { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .clip-item { display: flex; background: var(--input-bg); border: 2px solid var(--accent); border-radius: var(--radius); padding: 15px; font-weight: 700; cursor: pointer; position: relative;}
        .delete-btn { position: absolute; right: 10px; top: 10px; color: #ccc; font-weight: 800; border:none; background:none; font-size: 20px; }

        footer { text-align: center; font-size: 0.75rem; color: #999; margin-top: 15px; font-weight: 700; }
        footer a { color: inherit; }

        /* 復旧通知用 */
        #rescue-alert { display: none; background: #333; color: #fff; padding: 15px; border-radius: var(--radius); font-size: 0.8rem; font-weight: 800; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Quick Clip</h1>
        <a href="https://afrorakda.github.io/" class="hub-link">🏠 Hub</a>
    </header>

    <div id="rescue-alert">🚨 Old data has been rescued!</div>

    <div class="input-card">
        <label class="label">New Snippet</label>
        <div class="input-wrapper">
            <textarea id="clipInput" placeholder="Enter text to save..."></textarea>
        </div>
    </div>

    <button class="action-btn" onclick="addClip()">Save Snippet</button>

    <div id="clip-list"></div>

    <div class="footer-btns" style="display: flex; flex-direction: column; gap: 10px; margin-top: 10px;">
        <a id="kofi-link" href="https://ko-fi.com/afrorakda" target="_blank" style="background: var(--main); color: #fff; text-decoration: none; padding: 16px; border-radius: var(--radius); text-align: center; font-weight: 900; font-size: 0.9rem;">☕️ buy me a coffee</a>
    </div>

    <footer>
        <span id="footer-text">No login / No tracking / No ads / Browser only</span><br>
        <a id="privacy-link" href="https://afrorakda.com/privacy/">Privacy Policy</a> / <span id="copyright">afrorakda © 2026</span>
    </footer>
</div>

<script>
    const STORAGE_KEY = 'fridge_clips';
    let clips = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

    // --- 救出ロジック開始 ---
    function rescueData() {
        let rescued = false;
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            // 現在のキー以外で、クリップボードデータらしきものを探す
            if (key !== STORAGE_KEY && (key.includes('clip') || key.includes('fridge'))) {
                try {
                    const oldData = JSON.parse(localStorage.getItem(key));
                    if (Array.isArray(oldData)) {
                        clips = [...new Set([...clips, ...oldData])]; // 重複排除して統合
                        rescued = true;
                    }
                } catch(e) {}
            }
        }
        if (rescued) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(clips));
            document.getElementById('rescue-alert').style.display = 'block';
        }
    }
    // --- 救出ロジック終了 ---

    function renderClips() {
        const list = document.getElementById('clip-list');
        list.innerHTML = '';
        clips.forEach((clip, index) => {
            const div = document.createElement('div');
            div.className = 'clip-item';
            div.innerHTML = `<span>${clip}</span><button class="delete-btn" onclick="deleteClip(${index})">×</button>`;
            div.onclick = () => {
                navigator.clipboard.writeText(clip);
                div.style.background = '#333';
                div.style.color = '#fff';
                setTimeout(() => { div.style.background = ''; div.style.color = ''; }, 150);
            };
            list.appendChild(div);
        });
    }

    function addClip() {
        const text = document.getElementById('clipInput').value.trim();
        if (text) {
            clips.unshift(text);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(clips));
            document.getElementById('clipInput').value = '';
            renderClips();
        }
    }

    function deleteClip(index) {
        event.stopPropagation();
        clips.splice(index, 1);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(clips));
        renderClips();
    }

    async function loadFooter() {
        try {
            const response = await fetch('footer.json');
            if (response.ok) {
                const data = await response.json();
                if (data.footerText) document.getElementById('footer-text').innerText = data.footerText;
                if (data.privacyLink) document.getElementById('privacy-link').href = data.privacyLink;
                if (data.copyright) document.getElementById('copyright').innerText = data.copyright;
                if (data.kofiText) document.getElementById('kofi-link').innerText = data.kofiText;
            }
        } catch (e) {}
    }

    rescueData();
    renderClips();
    loadFooter();
</script>

</body>
</html>
