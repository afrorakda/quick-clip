<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Quick Clip</title>
    
    <link rel="icon" href="image_33.png">
    <link rel="apple-touch-icon" href="image_33.png">

    <style>
        :root {
            --main: #333;
            --bg: #fff;
            --accent: #eee;
            --input-bg: #fafafa;
            --radius: 15px;
        }

        /* 憲法: 全要素 15px角丸 / iOS Safari対策 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            padding: env(safe-area-inset-top, 20px) 20px env(safe-area-inset-bottom, 20px) 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 { font-size: 1.8rem; font-weight: 800; letter-spacing: -1.5px; }

        .hub-link {
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--main);
            background: var(--accent);
            padding: 8px 14px;
            border-radius: var(--radius);
        }

        .subtitle { font-size: 0.9rem; color: #666; font-weight: 700; text-align: left; }

        .input-card {
            background: var(--input-bg);
            padding: 18px;
            border-radius: var(--radius);
            border: 2px solid var(--accent);
        }

        .label {
            font-size: 0.75rem;
            font-weight: 900;
            color: #666;
            margin-bottom: 10px;
            display: block;
            text-transform: uppercase;
        }

        .input-wrapper { position: relative; }

        textarea {
            width: 100%;
            height: 80px;
            padding: 15px;
            padding-right: 45px;
            border: 2px solid var(--accent);
            border-radius: var(--radius);
            background: #fff;
            font-size: 1rem;
            font-weight: 600;
            color: var(--main) !important;
            outline: none;
            resize: none;
            -webkit-appearance: none;
            -webkit-text-fill-color: var(--main) !important;
            opacity: 1 !important;
        }
        textarea::placeholder { color: #bbb !important; -webkit-text-fill-color: #bbb !important; opacity: 1 !important; }

        .clr-btn {
            position: absolute; top: 10px; right: 10px; width: 28px; height: 28px;
            background: #ccc; color: #fff; border-radius: 50%;
            display: none; align-items: center; justify-content: center;
            cursor: pointer; border: none; font-size: 16px; font-weight: bold; z-index: 5;
        }

        .action-btn {
            width: 100%;
            padding: 18px;
            background: var(--main);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            -webkit-text-fill-color: #fff;
        }
        .action-btn:active { transform: scale(0.98); }

        /* スクロール窓の設計 */
        #clip-list { 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            max-height: 320px; 
            overflow-y: auto; 
            padding-right: 5px;
            scrollbar-width: none; /* Firefox */
        }
        #clip-list::-webkit-scrollbar { display: none; /* Safari/Chrome */ }
        
        .clip-item {
            display: flex;
            align-items: center;
            background: var(--input-bg);
            border: 2px solid var(--accent);
            border-radius: var(--radius);
            padding: 5px;
            cursor: pointer;
            transition: all 0.1s ease;
        }
        
        /* タップ時の反転フィードバック */
        .clip-item:active, .clip-item.copied-flash { 
            background: var(--main) !important; 
            border-color: var(--main);
        }
        .clip-item:active .clip-text, .clip-item.copied-flash .clip-text { color: #fff; }
        .clip-item:active .delete-btn, .clip-item.copied-flash .delete-btn { color: #fff; opacity: 0.5; }
        
        .clip-text {
            flex: 1;
            padding: 12px 15px;
            font-size: 0.95rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .delete-btn {
            width: 44px;
            height: 44px;
            background: transparent;
            color: #ccc;
            border: none;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 救済措置ボタン */
        .export-btn {
            width: 100%;
            padding: 10px;
            background: transparent;
            color: #999;
            border: 1px dashed #ccc;
            border-radius: var(--radius);
            font-size: 0.75rem;
            font-weight: 800;
            cursor: pointer;
            margin-top: 5px;
        }

        .footer-btns { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .kofi-btn {
            background: var(--main); color: #fff; text-decoration: none;
            padding: 16px; border-radius: var(--radius); text-align: center;
            font-weight: 900; font-size: 0.9rem; -webkit-text-fill-color: #fff;
        }
        .home-btn {
            background: var(--accent); color: var(--main); border: none;
            padding: 12px; border-radius: var(--radius); font-weight: 800; font-size: 0.8rem; cursor: pointer;
        }

        footer { text-align: center; font-size: 0.75rem; color: #999; line-height: 1.6; font-weight: 700; margin-top: 15px; }
        footer a { color: inherit; text-decoration: underline; }

        #modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px);
        }
        .modal-content {
            background: #fff; width: 90%; max-width: 340px; padding: 35px;
            border-radius: var(--radius); text-align: left; position: relative;
        }
        .close-x { position: absolute; top: 15px; right: 20px; font-size: 24px; color: #ccc; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Quick Clip</h1>
        <a href="https://afrorakda.github.io/" class="hub-link">🏠 Hub</a>
    </header>
    <p class="subtitle">Tap to copy. Long snippets scroll.</p>

    <div class="input-card">
        <label class="label">New Snippet</label>
        <div class="input-wrapper">
            <textarea id="clipInput" placeholder="Enter text to save..." oninput="toggleClr()"></textarea>
            <button class="clr-btn" id="clrBtn" onclick="clearInput()">×</button>
        </div>
    </div>

    <button class="action-btn" onclick="addClip()">Save Snippet</button>

    <div id="clip-list"></div>
    <button id="exportBtn" class="export-btn" onclick="exportAll()" style="display:none;">📥 Copy All Clips (Backup)</button>

    <div class="footer-btns">
        <a href="https://ko-fi.com/afrorakda" target="_blank" class="kofi-btn">☕️ buy me a coffee</a>
        <button class="home-btn" onclick="showModal()">Add to Home Screen</button>
    </div>

    <footer>
        No login / No tracking / No ads / Browser only<br>
        <a href="https://afrorakda.com/privacy/">Privacy Policy</a> / afrorakda © 2026
    </footer>
</div>

<div id="modal" onclick="hideModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-x" onclick="hideModal()">×</span>
        <h3 style="margin-bottom: 15px; font-weight: 900;">📱 Install</h3>
        <p style="font-size: 0.9rem; line-height: 1.6; font-weight: 700;">
            🍏 <strong>iPhone:</strong><br>Share > Add to Home Screen<br><br>
            🤖 <strong>Android:</strong><br>Menu (⋮) > Add to Home Screen
        </p>
    </div>
</div>

<script>
    const clipInput = document.getElementById('clipInput');
    const clrBtn = document.getElementById('clrBtn');
    const exportBtn = document.getElementById('exportBtn');
    let clips = JSON.parse(localStorage.getItem('fridge_clips') || '[]');

    function toggleClr() {
        clrBtn.style.display = clipInput.value.length > 0 ? 'flex' : 'none';
    }

    function clearInput() {
        clipInput.value = '';
        toggleClr();
        clipInput.focus();
    }

    function renderClips() {
        const list = document.getElementById('clip-list');
        list.innerHTML = '';
        exportBtn.style.display = clips.length > 0 ? 'block' : 'none';

        clips.forEach((clip, index) => {
            const div = document.createElement('div');
            div.className = 'clip-item';
            div.onclick = () => copyClip(clip, div);
            div.innerHTML = `
                <div class="clip-text">${clip}</div>
                <button class="delete-btn" onclick="event.stopPropagation(); deleteClip(${index})">×</button>
            `;
            list.appendChild(div);
        });
    }

    function addClip() {
        const text = clipInput.value.trim();
        if (text) {
            clips.unshift(text);
            localStorage.setItem('fridge_clips', JSON.stringify(clips));
            clipInput.value = '';
            toggleClr();
            renderClips();
        }
    }

    function deleteClip(index) {
        clips.splice(index, 1);
        localStorage.setItem('fridge_clips', JSON.stringify(clips));
        renderClips();
    }

    async function copyClip(text, element) {
        try {
            await navigator.clipboard.writeText(text);
            element.classList.add('copied-flash');
            setTimeout(() => {
                element.classList.remove('copied-flash');
            }, 200);
        } catch (err) {
            console.error('Failed to copy');
        }
    }

    async function exportAll() {
        if (clips.length === 0) return;
        const allText = clips.join('\n---\n');
        try {
            await navigator.clipboard.writeText(allText);
            const original = exportBtn.innerText;
            exportBtn.innerText = '✅ All Clips Copied!';
            setTimeout(() => { exportBtn.innerText = original; }, 1500);
        } catch (err) { console.error(err); }
    }

    function showModal() { document.getElementById('modal').style.display = 'flex'; }
    function hideModal() { document.getElementById('modal').style.display = 'none'; }

    renderClips();
</script>

</body>
</html>
